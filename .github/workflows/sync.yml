name: Salesforce → ClickUp Sync

on:
  # Runs weekdays at 7:00 AM UTC — adjust the cron if your team is in a different timezone.
  # Use https://crontab.guru to convert: e.g. 7 AM EST = "0 12 * * 1-5"
  schedule:
    - cron: "0 7 * * 1-5"

  # Lets you trigger a manual run from the Actions tab at any time
  workflow_dispatch:

jobs:
  sync:
    name: Run sync
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # ── Gmail ────────────────────────────────────────────────────────
      GMAIL_ADDRESS:              ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD:         ${{ secrets.GMAIL_APP_PASSWORD }}
      GMAIL_IMAP_HOST:            ${{ secrets.GMAIL_IMAP_HOST || 'imap.gmail.com' }}
      GMAIL_SUBJECT_PATTERN:      ${{ secrets.GMAIL_SUBJECT_PATTERN || 'Salesforce Opportunity' }}
      GMAIL_ATTACHMENT_NAME_PATTERN: ${{ secrets.GMAIL_ATTACHMENT_NAME_PATTERN || '.csv' }}

      # ── ClickUp ──────────────────────────────────────────────────────
      CLICKUP_API_TOKEN:          ${{ secrets.CLICKUP_API_TOKEN }}
      CLICKUP_LIST_ID:            ${{ secrets.CLICKUP_LIST_ID }}
      CLICKUP_CLOSED_STAGES:      ${{ secrets.CLICKUP_CLOSED_STAGES || 'Closed Won,Closed Lost' }}

      # ── ClickUp custom field IDs ─────────────────────────────────────
      CLICKUP_FIELD_ID_SF_OPPORTUNITY_ID:       ${{ secrets.CLICKUP_FIELD_ID_SF_OPPORTUNITY_ID }}
      CLICKUP_FIELD_ID_OWNER:                   ${{ secrets.CLICKUP_FIELD_ID_OWNER }}
      CLICKUP_FIELD_ID_ACCOUNT_NAME:            ${{ secrets.CLICKUP_FIELD_ID_ACCOUNT_NAME }}
      CLICKUP_FIELD_ID_STAGE:                   ${{ secrets.CLICKUP_FIELD_ID_STAGE }}
      CLICKUP_FIELD_ID_ARR:                     ${{ secrets.CLICKUP_FIELD_ID_ARR }}
      CLICKUP_FIELD_ID_SALES_ESTIMATED_QUOTA_RELIEF: ${{ secrets.CLICKUP_FIELD_ID_SALES_ESTIMATED_QUOTA_RELIEF }}
      CLICKUP_FIELD_ID_CLOSE_DATE:              ${{ secrets.CLICKUP_FIELD_ID_CLOSE_DATE }}
      CLICKUP_FIELD_ID_NEXT_STEP_DATE:          ${{ secrets.CLICKUP_FIELD_ID_NEXT_STEP_DATE }}
      CLICKUP_FIELD_ID_NEXT_STEP:               ${{ secrets.CLICKUP_FIELD_ID_NEXT_STEP }}
      CLICKUP_FIELD_ID_FORECAST_CATEGORY:       ${{ secrets.CLICKUP_FIELD_ID_FORECAST_CATEGORY }}
      CLICKUP_FIELD_ID_TYPE:                    ${{ secrets.CLICKUP_FIELD_ID_TYPE }}
      CLICKUP_FIELD_ID_METRICS:                 ${{ secrets.CLICKUP_FIELD_ID_METRICS }}
      CLICKUP_FIELD_ID_ECONOMIC_BUYER:          ${{ secrets.CLICKUP_FIELD_ID_ECONOMIC_BUYER }}
      CLICKUP_FIELD_ID_DECISION_CRITERIA:       ${{ secrets.CLICKUP_FIELD_ID_DECISION_CRITERIA }}
      CLICKUP_FIELD_ID_DECISION_PROCESS:        ${{ secrets.CLICKUP_FIELD_ID_DECISION_PROCESS }}
      CLICKUP_FIELD_ID_PAPER_PROCESS:           ${{ secrets.CLICKUP_FIELD_ID_PAPER_PROCESS }}
      CLICKUP_FIELD_ID_IMPLICATED_PAIN:         ${{ secrets.CLICKUP_FIELD_ID_IMPLICATED_PAIN }}
      CLICKUP_FIELD_ID_CHAMPION_NAME:           ${{ secrets.CLICKUP_FIELD_ID_CHAMPION_NAME }}
      CLICKUP_FIELD_ID_COMPETITOR:              ${{ secrets.CLICKUP_FIELD_ID_COMPETITOR }}
      CLICKUP_FIELD_ID_OTHER_COMPETITOR:        ${{ secrets.CLICKUP_FIELD_ID_OTHER_COMPETITOR }}
      CLICKUP_FIELD_ID_CUO_MEETING:             ${{ secrets.CLICKUP_FIELD_ID_CUO_MEETING }}
      CLICKUP_FIELD_ID_COMPLETED:               ${{ secrets.CLICKUP_FIELD_ID_COMPLETED }}
      CLICKUP_FIELD_ID_EVALUATION_AGREED:       ${{ secrets.CLICKUP_FIELD_ID_EVALUATION_AGREED }}
      CLICKUP_FIELD_ID_PRICING_DISCUSSED:       ${{ secrets.CLICKUP_FIELD_ID_PRICING_DISCUSSED }}
      CLICKUP_FIELD_ID_DECISION_CRITERIA_MET:   ${{ secrets.CLICKUP_FIELD_ID_DECISION_CRITERIA_MET }}
      CLICKUP_FIELD_ID_ECONOMIC_BUYER_APPROVED: ${{ secrets.CLICKUP_FIELD_ID_ECONOMIC_BUYER_APPROVED }}
      CLICKUP_FIELD_ID_DEPARTMENT:              ${{ secrets.CLICKUP_FIELD_ID_DEPARTMENT }}
      CLICKUP_FIELD_ID_IRONCLAD_SIGNATORY:      ${{ secrets.CLICKUP_FIELD_ID_IRONCLAD_SIGNATORY }}
      CLICKUP_FIELD_ID_MAP_URL:                 ${{ secrets.CLICKUP_FIELD_ID_MAP_URL }}
      CLICKUP_FIELD_ID_THREE_WHYS:              ${{ secrets.CLICKUP_FIELD_ID_THREE_WHYS }}
      CLICKUP_FIELD_ID_PLAN:                    ${{ secrets.CLICKUP_FIELD_ID_PLAN }}
      CLICKUP_FIELD_ID_NUMBER_OF_PLAN_SEATS:    ${{ secrets.CLICKUP_FIELD_ID_NUMBER_OF_PLAN_SEATS }}
      CLICKUP_FIELD_ID_CREATED_DATE:            ${{ secrets.CLICKUP_FIELD_ID_CREATED_DATE }}

      # ── CSV column mapping (only set secrets for these if your SF report ─
      # ── uses different column headers than the defaults below)          ─
      CSV_MAP_SF_OPPORTUNITY_ID:          ${{ secrets.CSV_MAP_SF_OPPORTUNITY_ID || 'Opportunity ID' }}
      CSV_MAP_NAME:                       ${{ secrets.CSV_MAP_NAME || 'Opportunity Name' }}
      CSV_MAP_OWNER:                      ${{ secrets.CSV_MAP_OWNER || 'Opportunity Owner' }}
      CSV_MAP_ACCOUNT_NAME:               ${{ secrets.CSV_MAP_ACCOUNT_NAME || 'Account Name' }}
      CSV_MAP_STAGE:                      ${{ secrets.CSV_MAP_STAGE || 'Stage' }}
      CSV_MAP_ARR:                        ${{ secrets.CSV_MAP_ARR || 'Annual Recurring Revenue (ARR)' }}
      CSV_MAP_SALES_ESTIMATED_QUOTA_RELIEF: ${{ secrets.CSV_MAP_SALES_ESTIMATED_QUOTA_RELIEF || 'Sales Estimated Quota Relief' }}
      CSV_MAP_CLOSE_DATE:                 ${{ secrets.CSV_MAP_CLOSE_DATE || 'Close Date' }}
      CSV_MAP_NEXT_STEP_DATE:             ${{ secrets.CSV_MAP_NEXT_STEP_DATE || 'Next Step Date' }}
      CSV_MAP_NEXT_STEP:                  ${{ secrets.CSV_MAP_NEXT_STEP || 'Next Step' }}
      CSV_MAP_FORECAST_CATEGORY:          ${{ secrets.CSV_MAP_FORECAST_CATEGORY || 'Forecast Category' }}
      CSV_MAP_TYPE:                       ${{ secrets.CSV_MAP_TYPE || 'Type' }}
      CSV_MAP_METRICS:                    ${{ secrets.CSV_MAP_METRICS || 'Metrics' }}
      CSV_MAP_ECONOMIC_BUYER:             ${{ secrets.CSV_MAP_ECONOMIC_BUYER || 'Economic Buyer' }}
      CSV_MAP_DECISION_CRITERIA:          ${{ secrets.CSV_MAP_DECISION_CRITERIA || 'Decision Criteria' }}
      CSV_MAP_DECISION_PROCESS:           ${{ secrets.CSV_MAP_DECISION_PROCESS || 'Decision Process' }}
      CSV_MAP_PAPER_PROCESS:              ${{ secrets.CSV_MAP_PAPER_PROCESS || 'Paper Process' }}
      CSV_MAP_IMPLICATED_PAIN:            ${{ secrets.CSV_MAP_IMPLICATED_PAIN || 'Implicated Pain' }}
      CSV_MAP_CHAMPION_NAME:              ${{ secrets.CSV_MAP_CHAMPION_NAME || 'Champion Name' }}
      CSV_MAP_COMPETITOR:                 ${{ secrets.CSV_MAP_COMPETITOR || 'Competitor' }}
      CSV_MAP_OTHER_COMPETITOR:           ${{ secrets.CSV_MAP_OTHER_COMPETITOR || 'Other Competitor' }}
      CSV_MAP_CUO_MEETING:                ${{ secrets.CSV_MAP_CUO_MEETING || 'CUO Meeting Completed' }}
      CSV_MAP_COMPLETED:                  ${{ secrets.CSV_MAP_COMPLETED || 'Completed' }}
      CSV_MAP_EVALUATION_AGREED:          ${{ secrets.CSV_MAP_EVALUATION_AGREED || 'Evaluation Agreed' }}
      CSV_MAP_PRICING_DISCUSSED:          ${{ secrets.CSV_MAP_PRICING_DISCUSSED || 'Pricing Discussed' }}
      CSV_MAP_DECISION_CRITERIA_MET:      ${{ secrets.CSV_MAP_DECISION_CRITERIA_MET || 'Decision Criteria Met' }}
      CSV_MAP_ECONOMIC_BUYER_APPROVED:    ${{ secrets.CSV_MAP_ECONOMIC_BUYER_APPROVED || 'Economic Buyer Approved' }}
      CSV_MAP_DEPARTMENT:                 ${{ secrets.CSV_MAP_DEPARTMENT || 'Department' }}
      CSV_MAP_IRONCLAD_SIGNATORY:         ${{ secrets.CSV_MAP_IRONCLAD_SIGNATORY || 'Ironclad Signatory' }}
      CSV_MAP_MAP_URL:                    ${{ secrets.CSV_MAP_MAP_URL || 'Mutual Action Plan (MAP) URL' }}
      CSV_MAP_THREE_WHYS:                 ${{ secrets.CSV_MAP_THREE_WHYS || '3 Whys Business Case' }}
      CSV_MAP_PLAN:                       ${{ secrets.CSV_MAP_PLAN || 'Plan' }}
      CSV_MAP_NUMBER_OF_PLAN_SEATS:       ${{ secrets.CSV_MAP_NUMBER_OF_PLAN_SEATS || 'Number of Plan Seats' }}
      CSV_MAP_CREATED_DATE:               ${{ secrets.CSV_MAP_CREATED_DATE || 'Created Date' }}

      # ── Logging ──────────────────────────────────────────────────────
      LOG_FILE: logs/sync.log
      LOG_LEVEL: INFO

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run sync
        run: python3 main.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
