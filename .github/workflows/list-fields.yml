name: List ClickUp Custom Fields

# Run this once to discover the UUID of every custom field on your ClickUp list.
# Trigger it manually from the Actions tab → "List ClickUp Custom Fields" → Run workflow.
# Copy the IDs from the run log into your GitHub secrets as CLICKUP_FIELD_ID_<NAME>.

on:
  workflow_dispatch:

jobs:
  list-fields:
    name: List fields
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      CLICKUP_LIST_ID:   ${{ secrets.CLICKUP_LIST_ID }}
      # These are not used by --list-fields but load_settings() requires them
      GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: List custom fields
        run: python3 main.py --list-fields
